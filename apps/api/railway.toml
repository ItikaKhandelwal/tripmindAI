[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.variables]
APP_ENV = "production"
```

---

**`Procfile`** — backup start command (Railway uses this if no Dockerfile):
```
web: uvicorn app.main:app --host 0.0.0.0 --port $PORT
```

---

**`.dockerignore`** — tells Docker what NOT to copy (keeps image small):
```
venv/
__pycache__/
*.pyc
*.pyo
*.pyd
.env
.env.*
!.env.example
*.log
.git/
.gitignore
README.md
*.md
.pytest_cache/
htmlcov/
.coverage